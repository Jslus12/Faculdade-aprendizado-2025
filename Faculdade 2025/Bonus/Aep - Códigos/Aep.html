<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Paciente - NutriHealth</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      background-color: #0077b6;
      color: white;
      padding: 15px;
      margin: 0;
    }

    form {
      background-color: white;
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0px 0px 5px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background-color: #0077b6;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005f87;
    }

    .footer {
      text-align: center;
      color: #555;
      font-size: 13px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Cadastro de Paciente</h1>

  <form>
    <label for="nome">Nome completo:</label>
    <input type="text" id="nome" name="nome" required>

    <label for="idade">Idade:</label>
    <input type="number" id="idade" name="idade" required>

    <label for="cpf">CPF:</label>
    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">

    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" placeholder="email@exemplo.com">

    <label for="alergias">Alergias:</label>
    <input type="text" id="alergias" name="alergias" placeholder="Ex: lactose, glúten...">

    <label for="doencas">Doenças pré-existentes:</label>
    <input type="text" id="doencas" name="doencas" placeholder="Ex: diabetes, hipertensão...">

    <label for="habitos">Hábitos alimentares:</label>
    <input type="text" id="habitos" name="habitos" placeholder="Ex: vegetariano, come fora...">

    <label for="anamnese">Anamnese / Observações:</label>
    <textarea id="anamnese" name="anamnese" rows="4" placeholder="Descreva informações relevantes do paciente..."></textarea>

    <label for="dataConsulta">Data da consulta:</label>
    <input type="date" id="dataConsulta" name="dataConsulta">

    <button type="submit">Cadastrar</button>
  </form>

  <div class="footer">
    <p>NutriHealth © 2025 — Projeto AEP | Unicesumar</p>
  </div>
</body>
</html>
